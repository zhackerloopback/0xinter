<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="auth-body">

<div class="auth-card">

    <h1>Create Account</h1>

    <p>
        Register a new account
    </p>

    {% with messages = get_flashed_messages() %}
    {% if messages %}

    <div class="alert">

        {{ messages[0] }}

    </div>

    {% endif %}
    {% endwith %}

    <form method="POST">

        <input
            type="hidden"
            name="csrf_token"
            value="{{ csrf_token() }}">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required>

        <input
            type="email"
            name="email"
            placeholder="Email Address"
            required>

        <input
            type="password"
            id="password"
            name="password"
            placeholder="Password"
            required>

        <input
            type="password"
            id="confirmPassword"
            name="confirm_password"
            placeholder="Confirm Password"
            required>

        <div
            id="strength"
            class="password-strength">
        </div>

        <div class="checkbox-group">

            <input
                type="checkbox"
                id="showPassword">

            <label
                for="showPassword">

                Show Password

            </label>

        </div>

        <button type="submit">

            Create Account

        </button>

    </form>

    <div class="auth-links">

        <a href="/login">

            Already have an account?

        </a>

    </div>

</div>

<script>

const password =
document.getElementById(
    "password"
);

const confirmPassword =
document.getElementById(
    "confirmPassword"
);

const strength =
document.getElementById(
    "strength"
);

document.getElementById(
    "showPassword"
).addEventListener(
    "change",
    function(){

        password.type =
        this.checked
        ? "text"
        : "password";

        confirmPassword.type =
        this.checked
        ? "text"
        : "password";

    }
);

password.addEventListener(
    "keyup",
    function(){

        let value =
        password.value;

        if(
            value.length < 6
        ){

            strength.className =
            "password-strength strength-weak";

            strength.innerHTML =
            "Weak Password";

        }

        else if(
            value.length < 10
        ){

            strength.className =
            "password-strength strength-medium";

            strength.innerHTML =
            "Medium Password";

        }

        else{

            strength.className =
            "password-strength strength-strong";

            strength.innerHTML =
            "Strong Password";

        }

    }
);

</script>

</body>
</html>
