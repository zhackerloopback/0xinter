<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">

    <div class="card bg-secondary text-light">

        <div class="card-body">

            <h2 class="mb-4">
                Forgot Password
            </h2>

            <form method="POST">

                <input type="hidden"
                       name="csrf_token"
                       value="{{ csrf_token() }}">

                <div class="mb-3">

                    <label class="form-label">
                        Username
                    </label>

                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-warning">

                    Generate Reset Link

                </button>

            </form>

            {% if reset_link %}

            <hr>

            <h5>Reset Link</h5>

            <a href="{{ reset_link }}"
               class="text-info">

                {{ reset_link }}

            </a>

            {% endif %}

        </div>

    </div>

</div>

</body>
</html>
