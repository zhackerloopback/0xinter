<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">

    <div class="card bg-secondary text-light">

        <div class="card-body">

            <h2 class="mb-4">
                Reset Password
            </h2>

            <form method="POST">

                <input type="hidden"
                       name="csrf_token"
                       value="{{ csrf_token() }}">

                <div class="mb-3">

                    <label class="form-label">
                        New Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Confirm Password
                    </label>

                    <input
                        type="password"
                        name="confirm_password"
                        class="form-control"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-success">

                    Reset Password

                </button>

            </form>

            {% if error %}

            <div class="alert alert-danger mt-3">
                {{ error }}
            </div>

            {% endif %}

        </div>

    </div>

</div>

</body>
</html>
