{% extends "base.html" %}

{% block title %}
Metadata Analyzer
{% endblock %}

{% block content %}

<h1>Metadata Analyzer</h1>

<div class="tool-card">

<form method="POST"
      enctype="multipart/form-data">

    <input type="hidden"
    name="csrf_token"
    value="{{ csrf_token() }}">
    
    <input
    type="file"
    name="file"
    required>

    <button type="submit">
        Extract Metadata
    </button>

</form>

</div>

{% if metadata %}


<div class="result-card">

<h2>Metadata Results</h2>

<table>

<tr>
<th>Field</th>
<th>Value</th>
</tr>

{% for key, value in metadata.items() %}

<tr>
<td>{{ key }}</td>
<td>{{ value }}</td>
</tr>

{% endfor %}

</table>

</div>

{% endif %}



{% endblock %}
