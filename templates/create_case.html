{% extends "base.html" %}

{% block title %}
Create Case
{% endblock %}

{% block content %}

<h1>📁 Create New Case</h1>

<div class="tool-card">

<form method="POST">

<input type="hidden"
       name="csrf_token"
       value="{{ csrf_token() }}">

<label>Case Title</label>

<input
type="text"
name="title"
placeholder="Enter Case Title"
required>

<br><br>

<label>Target</label>

<input
type="text"
name="target"
placeholder="IP, Domain, Hash, Email..."
required>

<br><br>

<label>Module</label>

<select name="module" required>

<option value="WHOIS">WHOIS</option>

<option value="DNS">DNS</option>

<option value="GEOIP">GeoIP</option>

<option value="HASH">Hash</option>

<option value="METADATA">Metadata</option>

<option value="EMAIL">Email</option>

<option value="IOC">IOC</option>

<option value="YARA">YARA</option>

</select>

<br><br>

<label>Priority</label>

<select name="priority">

<option value="Low">
🟢 Low
</option>

<option value="Medium" selected>
🟡 Medium
</option>

<option value="High">
🟠 High
</option>

<option value="Critical">
🔴 Critical
</option>

</select>

<br><br>

<label>Assigned To</label>

<input
type="text"
name="assigned_to"
placeholder="Username">

<br><br>

<label>Notes</label>

<textarea
name="notes"
rows="6"
placeholder="Investigation notes..."></textarea>

<br><br>

<button type="submit">

📁 Create Case

</button>

</form>

</div>

{% endblock %}
