<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>
</head>
<body>

<h2>Change Password</h2>

<form method="POST">

    <input type="hidden"
           name="csrf_token"
           value="{{ csrf_token() }}">

    <input type="password"
           name="current_password"
           placeholder="Current Password"
           required>

    <input type="password"
           name="new_password"
           placeholder="New Password"
           required>

    <button type="submit">
        Change Password
    </button>

</form>

</body>
</html>
